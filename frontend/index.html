<!DOCTYPE html>
<html lang="my">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>FRAME — Feed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0b0e14;
    --panel:#141924;
    --panel-2:#1b2230;
    --line:#2a3242;
    --amber:#e8a33d;
    --teal:#3ddbd9;
    --text:#edeff2;
    --muted:#8891a3;
    --danger:#e6675a;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0;
    background:var(--ink);
    color:var(--text);
    font-family:'Inter', sans-serif;
    -webkit-tap-highlight-color:transparent;
  }
  ::selection{ background:var(--amber); color:#0b0e14; }

  /* ---------- top bar ---------- */
  .topbar{
    position:sticky; top:0; z-index:10;
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 18px;
    background:rgba(11,14,20,0.9);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }
  .brand{
    font-family:'Space Grotesk', sans-serif;
    font-weight:700; font-size:20px; letter-spacing:0.5px;
    display:flex; align-items:center; gap:8px;
  }
  .brand .dot{
    width:8px; height:8px; border-radius:50%;
    background:var(--danger);
    box-shadow:0 0 8px var(--danger);
    animation:pulse 1.6s infinite ease-in-out;
  }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:0.35;} }
  .frame-count{
    font-family:'JetBrains Mono', monospace;
    font-size:12px; color:var(--muted);
  }

  /* ---------- auth screen ---------- */
  .auth-wrap{
    min-height:100vh; display:flex; flex-direction:column;
    justify-content:center; align-items:center; padding:24px;
  }
  .auth-card{
    width:100%; max-width:360px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:28px 24px;
    position:relative;
    overflow:hidden;
  }
  .auth-card::before{
    content:"";
    position:absolute; top:0; left:0; right:0; height:3px;
    background:linear-gradient(90deg, var(--amber), var(--teal));
  }
  .auth-title{
    font-family:'Space Grotesk', sans-serif;
    font-size:26px; font-weight:700; margin:0 0 4px;
  }
  .auth-sub{
    color:var(--muted); font-size:13px; margin:0 0 22px;
  }
  label{
    display:block; font-size:11px; letter-spacing:0.08em;
    text-transform:uppercase; color:var(--muted); margin:14px 0 6px;
    font-family:'JetBrains Mono', monospace;
  }
  input, textarea{
    width:100%; padding:12px 13px;
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:9px;
    color:var(--text);
    font-family:'Inter', sans-serif;
    font-size:14px;
    outline:none;
    transition:border-color .15s ease;
  }
  input:focus, textarea:focus{ border-color:var(--amber); }
  textarea{ resize:vertical; min-height:70px; }

  .btn{
    width:100%; padding:12px; margin-top:16px;
    border:none; border-radius:9px;
    font-family:'Space Grotesk', sans-serif;
    font-weight:600; font-size:14px;
    cursor:pointer;
    transition:transform .1s ease, opacity .15s ease;
  }
  .btn:active{ transform:scale(0.98); }
  .btn-primary{ background:var(--amber); color:#0b0e14; }
  .btn-ghost{
    background:transparent; color:var(--text);
    border:1px solid var(--line);
  }
  .btn-block{ background:var(--teal); color:#0b0e14; }
  .auth-msg{
    font-size:12.5px; margin-top:10px; min-height:16px;
    font-family:'JetBrains Mono', monospace;
  }
  .auth-msg.err{ color:var(--danger); }
  .auth-msg.ok{ color:var(--teal); }

  /* ---------- app ---------- */
  .app{ display:none; max-width:520px; margin:0 auto; padding-bottom:40px; }

  .composer{
    margin:16px; padding:16px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
  }
  .composer-head{
    display:flex; align-items:center; gap:8px; margin-bottom:10px;
    font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--muted);
    text-transform:uppercase; letter-spacing:.08em;
  }
  .file-row{
    display:flex; align-items:center; gap:10px; margin-top:12px;
  }
  .file-btn{
    flex-shrink:0;
    padding:10px 14px;
    background:var(--panel-2);
    border:1px dashed var(--line);
    border-radius:9px;
    font-size:12.5px; color:var(--muted);
    cursor:pointer;
    font-family:'JetBrains Mono', monospace;
  }
  .file-name{ font-size:12px; color:var(--teal); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  #fileInput{ display:none; }

  /* ---------- feed ---------- */
  #feed{ padding:0 16px; }
  .frame{
    position:relative;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    margin-bottom:18px;
    overflow:hidden;
    animation:rise .35s ease both;
  }
  @keyframes rise{ from{ opacity:0; transform:translateY(6px); } to{ opacity:1; transform:translateY(0); } }

  .sprockets{
    position:absolute; top:0; bottom:0; width:14px;
    display:flex; flex-direction:column; justify-content:space-evenly;
    align-items:center; opacity:.5;
  }
  .sprockets.left{ left:0; }
  .sprockets.right{ right:0; }
  .sprockets span{
    width:5px; height:5px; border-radius:1px;
    background:var(--line);
  }

  .frame-header{
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 26px 8px;
  }
  .frame-user{
    display:flex; align-items:center; gap:8px;
    font-family:'Space Grotesk', sans-serif; font-weight:600; font-size:14.5px;
  }
  .avatar{
    width:26px; height:26px; border-radius:50%;
    background:linear-gradient(135deg, var(--amber), var(--teal));
    display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:700; color:#0b0e14;
  }
  .frame-no{
    font-family:'JetBrains Mono', monospace; font-size:11px; color:var(--muted);
  }
  .frame-caption{
    padding:0 26px 12px; font-size:14px; line-height:1.5; color:var(--text);
  }
  .frame-media img, .frame-media video{
    width:100%; display:block; max-height:420px; object-fit:cover;
    background:#000;
  }
  .frame-footer{
    padding:10px 26px 14px;
    font-family:'JetBrains Mono', monospace;
    font-size:10.5px; color:var(--muted);
    display:flex; justify-content:space-between; align-items:center;
  }
  .frame-meta{ display:flex; gap:10px; align-items:center; }
  .frame-actions{ display:flex; gap:6px; }
  .icon-btn{
    width:28px; height:28px; border-radius:7px;
    display:flex; align-items:center; justify-content:center;
    background:var(--panel-2); border:1px solid var(--line);
    cursor:pointer; transition:background .15s ease, border-color .15s ease;
  }
  .icon-btn svg{ width:14px; height:14px; }
  .icon-btn.dl{ color:var(--teal); }
  .icon-btn.dl:hover{ border-color:var(--teal); }
  .icon-btn.del{ color:var(--danger); }
  .icon-btn.del:hover{ border-color:var(--danger); }
  .icon-btn:active{ transform:scale(0.92); }

  .empty{
    text-align:center; padding:60px 20px; color:var(--muted);
    font-family:'JetBrains Mono', monospace; font-size:13px;
  }

  .logout-link{
    display:block; text-align:center; margin:20px 0 0;
    color:var(--muted); font-size:12px; text-decoration:none;
    font-family:'JetBrains Mono', monospace;
  }
</style>
</head>
<body>

<div class="auth-wrap" id="authScreen">
  <div class="auth-card">
    <h1 class="auth-title">FRAME</h1>
    <p class="auth-sub">Video · ပုံ · စာ — user တစ်ယောက်ချင်းစီရဲ့ feed</p>

    <label>Username</label>
    <input id="username" placeholder="username">

    <label>Password</label>
    <input id="password" type="password" placeholder="••••••••">

    <button class="btn btn-primary" onclick="login()">ဝင်မယ် (Login)</button>
    <button class="btn btn-ghost" onclick="register()">အကောင့်သစ်ဖွင့်မယ် (Register)</button>
    <div class="auth-msg" id="authMsg"></div>
  </div>
</div>

<div class="app" id="app">
  <div class="topbar">
    <div class="brand"><span class="dot"></span> FRAME</div>
    <div class="frame-count" id="frameCount">0 frames</div>
  </div>

  <div class="composer">
    <div class="composer-head">New frame</div>
    <textarea id="caption" placeholder="ဘာဖြစ်နေလဲ ရေးပါ..."></textarea>
    <div class="file-row">
      <div class="file-btn" onclick="document.getElementById('fileInput').click()">+ ပုံ/ဗီဒီယို</div>
      <div class="file-name" id="fileName"></div>
    </div>
    <input type="file" id="fileInput" accept="image/*,video/*" onchange="onFilePick()">
    <button class="btn btn-block" onclick="createPost()">တင်မယ်</button>
  </div>

  <div id="feed"></div>
  <a class="logout-link" onclick="logout()">Log out</a>
</div>

<script>
const API = "https://frame-app.tgbot302.workers.dev";
let userId = null, username = null;

function showMsg(text, ok){
  const el = document.getElementById("authMsg");
  el.textContent = text;
  el.className = "auth-msg " + (ok ? "ok" : "err");
}

async function register(){
  const u = document.getElementById("username").value.trim();
  const p = document.getElementById("password").value;
  if(!u || !p) return showMsg("Username / Password ဖြည့်ပါ", false);
  const res = await fetch(API + "/register", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ username:u, password:p })
  });
  const data = await res.json();
  showMsg(data.success ? "Register ပြီးပါပြီ — Login ဝင်ပါ" : (data.error || "Error"), data.success);
}

async function login(){
  const u = document.getElementById("username").value.trim();
  const p = document.getElementById("password").value;
  if(!u || !p) return showMsg("Username / Password ဖြည့်ပါ", false);
  const res = await fetch(API + "/login", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ username:u, password:p })
  });
  if(!res.ok) return showMsg("Login မအောင်မြင်ပါ", false);
  const data = await res.json();
  userId = data.user.id;
  username = data.user.username;
  document.getElementById("authScreen").style.display = "none";
  document.getElementById("app").style.display = "block";
  loadFeed();
}

function logout(){
  userId = null;
  document.getElementById("app").style.display = "none";
  document.getElementById("authScreen").style.display = "flex";
  showMsg("", true);
}

function onFilePick(){
  const f = document.getElementById("fileInput").files[0];
  if(f && f.size > 500 * 1024 * 1024){
    alert("File size 500MB ထက် မကြီးရပါ");
    document.getElementById("fileInput").value = "";
    document.getElementById("fileName").textContent = "";
    return;
  }
  document.getElementById("fileName").textContent = f ? f.name : "";
}

function initials(name){
  return (name || "?").slice(0,2).toUpperCase();
}

let isUploading = false;

async function createPost(){
  if(isUploading) return;
  const caption = document.getElementById("caption").value.trim();
  const file = document.getElementById("fileInput").files[0];
  if(!caption && !file) return;

  const postBtn = document.querySelector(".composer .btn-block");
  isUploading = true;
  postBtn.disabled = true;

  try{
    let fileKey = null;
    let type = "text";

    if(file){
      type = file.type.startsWith("video") ? "video" : "image";
      postBtn.textContent = "Upload လုပ်နေသည်...";

      // 1. Presigned URL ရယူ (Worker ကို bypass လုပ်ပြီး R2 ဆီ တိုက်ရိုက်တင်ရန်)
      const presignRes = await fetch(API + "/presign", {
        method: "POST", headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ filename: file.name, contentType: file.type })
      });
      const presignData = await presignRes.json();

      // 2. File ကို R2 ဆီ တိုက်ရိုက် PUT (Worker ကို မဖြတ်ပါ — 100MB limit မရှိတော့ပါ)
      await fetch(presignData.uploadUrl, {
        method: "PUT",
        headers: { "Content-Type": file.type },
        body: file
      });

      fileKey = presignData.fileKey;
      postBtn.textContent = "တင်မယ်";
    }

    // 3. Post metadata ကို Worker ဆီ JSON နဲ့ ပို့ (file ကတော့ R2 ထဲ ရောက်နှင့်ပြီးသား)
    await fetch(API + "/post", {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ user_id: userId, username, type, caption, file_key: fileKey })
    });

    document.getElementById("caption").value = "";
    document.getElementById("fileInput").value = "";
    document.getElementById("fileName").textContent = "";
    loadFeed();
  } catch(e){
    alert("Upload မအောင်မြင်ပါ — ထပ်စမ်းကြည့်ပါ");
  } finally {
    isUploading = false;
    postBtn.disabled = false;
    postBtn.textContent = "တင်မယ်";
  }
}

async function loadFeed(){
  const res = await fetch(API + "/posts");
  const posts = await res.json();
  const feed = document.getElementById("feed");
  document.getElementById("frameCount").textContent = posts.length + " frames";

  if(posts.length === 0){
    feed.innerHTML = '<div class="empty">Frame မရှိသေးပါ — ပထမဆုံး post တင်လိုက်ပါ</div>';
    return;
  }

  feed.innerHTML = posts.map((p, i) => {
    const num = String(posts.length - i).padStart(3, "0");
    let media = "";
    if(p.type === "image") media = `<div class="frame-media"><img src="${API}/file/${p.file_key}" loading="lazy"></div>`;
    if(p.type === "video") media = `<div class="frame-media"><video controls src="${API}/file/${p.file_key}"></video></div>`;
    const caption = p.caption ? `<div class="frame-caption">${escapeHtml(p.caption)}</div>` : "";
    const time = new Date(p.created_at).toLocaleString("en-GB", { day:"2-digit", month:"short", hour:"2-digit", minute:"2-digit" });

    return `
      <div class="frame">
        <div class="sprockets left">${sprocketDots()}</div>
        <div class="sprockets right">${sprocketDots()}</div>
        <div class="frame-header">
          <div class="frame-user">
            <div class="avatar">${initials(p.username)}</div>
            ${escapeHtml(p.username)}
          </div>
          <div class="frame-no">#${num}</div>
        </div>
        ${caption}
        ${media}
        <div class="frame-footer">
          <div class="frame-meta">
            <span>${p.type.toUpperCase()}</span>
            <span>${time}</span>
          </div>
          <div class="frame-actions">
            ${p.file_key ? `
            <div class="icon-btn dl" onclick="downloadPost('${p.file_key}')" title="Download">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 21h16"/></svg>
            </div>` : ``}
            ${p.user_id === userId ? `
            <div class="icon-btn del" onclick="deletePost('${p.id}')" title="Delete">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2m-1 0v14a2 2 0 01-2 2H9a2 2 0 01-2-2V6h10z"/></svg>
            </div>` : ``}
          </div>
        </div>
      </div>`;
  }).join("");
}

async function downloadPost(fileKey){
  window.location.href = `${API}/download/${fileKey}`;
}

async function deletePost(postId){
  if(!confirm("ဒီ frame ကို ဖျက်မှာ သေချာလား?")) return;
  const res = await fetch(API + "/post/delete", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ post_id: postId, user_id: userId })
  });
  const data = await res.json();
  if(!data.success){
    alert(data.error || "ဖျက်လို့ မရပါ");
    return;
  }
  loadFeed();
}

function sprocketDots(){
  return Array(8).fill("<span></span>").join("");
}

function escapeHtml(str){
  const d = document.createElement("div");
  d.textContent = str;
  return d.innerHTML;
}
</script>
</body>
</html>
